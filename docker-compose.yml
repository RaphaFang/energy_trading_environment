services:
  # 資料抓取 → new_data/*.parquet → energy.duckdb。順序有意義:
  # calendar 是 spine(其餘 LEFT JOIN 掛上去)、load_duckdb 必須最後(它做合併)。
  # entsoe 需要 ENTSOE_TOKEN,沒 token 會跳過 → 解開 env_file 才抓得到 Tier-2。
  ingest:
    build: .
    container_name: power-ingest
    volumes:
      - ./:/app
    working_dir: /app
    profiles:
      - ingest
    command: >
      sh -c "python new_src/data/calendar_features.py &&
             python new_src/data/elspot_price.py &&
             python new_src/data/weather_forecast.py &&
             python new_src/data/energinet_forecast.py &&
             python new_src/data/residual_demand.py &&
             python new_src/data/fuel_prices.py &&
             python new_src/data/entsoe_features.py &&
             python new_src/data/load_duckdb.py"
    # env_file:
    #   - .env

  notebook:
    build: .
    container_name: power-notebook
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ./:/app
    working_dir: /app
    command: jupyter lab --ip=0.0.0.0 --allow-root --ServerApp.token=''

    # env_file:
    #   - .env
